<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="orb-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="200" height="200" rx="40" fill="url(#bg-grad)"/>

  <!-- Subtle grid pattern overlay -->
  <line x1="0" y1="50" x2="200" y2="50" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="100" x2="200" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="150" x2="200" y2="150" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="50" y1="0" x2="50" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Outer glow ring -->
  <ellipse cx="100" cy="100" rx="72" ry="26" fill="none" stroke="url(#ring1)" stroke-width="3" opacity="0.45" transform="rotate(-30 100 100)" filter="url(#glow)"/>
  <!-- Second ring -->
  <ellipse cx="100" cy="100" rx="52" ry="19" fill="none" stroke="url(#orb-grad)" stroke-width="2.5" opacity="0.7" transform="rotate(40 100 100)" filter="url(#glow)"/>
  <!-- Inner ring -->
  <ellipse cx="100" cy="100" rx="35" ry="12" fill="none" stroke="rgba(96,165,250,0.5)" stroke-width="1.5" transform="rotate(-10 100 100)"/>

  <!-- Core orb -->
  <circle cx="100" cy="100" r="18" fill="url(#orb-grad)" filter="url(#glow2)" opacity="0.95"/>
  <circle cx="100" cy="100" r="12" fill="url(#orb-grad)"/>
  <!-- Core highlight -->
  <circle cx="95" cy="95" r="4" fill="rgba(255,255,255,0.4)"/>

  <!-- Orbit dots -->
  <circle cx="168" cy="82" r="5.5" fill="#60A5FA" filter="url(#glow)" opacity="0.95"/>
  <circle cx="44" cy="120" r="4" fill="#A78BFA" filter="url(#glow)" opacity="0.9"/>
  <circle cx="128" cy="148" r="3.5" fill="#60A5FA" opacity="0.7"/>
</svg>
