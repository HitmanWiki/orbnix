<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── DEFAULT SEO (Google reads this before JS runs) ─── -->
    <title>Orbnix — Web Development Company in India | Websites, Apps & AI</title>
    <meta name="description" content="Orbnix builds professional websites, mobile apps, AI chatbots and e-commerce stores for businesses across India. Starting ₹25,000. Delivered in 7 days. 100% code ownership. Free consultation." />
    <meta name="keywords" content="web development company India, website design India, IT company Jaipur, web developer near me, website development Jaipur, React developer India, app development India" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Orbnix" />

    <!-- ─── OPEN GRAPH ─── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Orbnix" />
    <meta property="og:title" content="Orbnix — Web Development Company in India" />
    <meta property="og:description" content="Professional websites, apps and AI solutions for Indian businesses. Starting ₹25,000. Delivered in 7 days." />
    <meta property="og:url" content="https://www.orbnix.in/" />
    <meta property="og:image" content="https://www.orbnix.in/og-cover.png" />

    <!-- ─── TWITTER ─── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@orbnix" />
    <meta name="twitter:title" content="Orbnix — Web Development Company in India" />
    <meta name="twitter:description" content="Professional websites, apps and AI solutions for Indian businesses. Starting ₹25,000." />
    <meta name="twitter:image" content="https://www.orbnix.in/og-cover.png" />

    <!-- ─── CANONICAL ─── -->
    <link rel="canonical" href="https://www.orbnix.in/" />

    <!-- ─── GEO ─── -->
    <meta name="geo.region" content="IN-RJ" />
    <meta name="geo.placename" content="Jaipur, Rajasthan, India" />

    <!-- ─── SCHEMA — Organization (always present for Google) ─── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Orbnix",
      "url": "https://www.orbnix.in",
      "logo": "https://www.orbnix.in/orbnix-logo.png",
      "description": "Web development company in India building websites, apps and AI solutions for businesses.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Jaipur",
        "addressRegion": "Rajasthan",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-90798-81416",
        "contactType": "customer service",
        "email": "hello@orbnix.in"
      },
      "sameAs": [
        "https://www.instagram.com/orbnix.in",
        "https://www.facebook.com/orbnix.in",
        "https://x.com/orbnix"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
